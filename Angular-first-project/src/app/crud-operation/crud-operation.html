<div class="crud">
  <h2>📦 CRUD Operations</h2>

  <form (ngSubmit)="editing ? update() : add()" class="form">
    <input name="name" [(ngModel)]="model.name" placeholder="Enter name..." required />
    <input name="description" [(ngModel)]="model.description" placeholder="Enter description..." />

    <button type="submit" class="primary">
      {{ editing ? 'Update' : 'Add' }}
    </button>

    <button type="button" (click)="cancel()" *ngIf="editing" class="secondary">
      Cancel
    </button>
  </form>

  <table *ngIf="items.length" class="items">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th style="text-align:center;">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of items">
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.description }}</td>
        <td class="actions">
          <button (click)="startEdit(item)" class="edit">Edit</button>
          <button (click)="delete(item.id)" class="delete">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!items.length" class="empty">No items yet 🚀</p>
</div>
