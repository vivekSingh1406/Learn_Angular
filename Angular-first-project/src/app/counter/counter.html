<div>
  <h1>Welcome to My Angular App!</h1>
  <h2>Counter App</h2>

  <p>Count: {{ count }}</p>

  <button (click)="updateCount('inc')">Increment</button>
  <button (click)="updateCount('dec')" [disabled]="count === 0">Decrement</button>
  <button (click)="updateCount('reset')">Reset</button>
</div>
