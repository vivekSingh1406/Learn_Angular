<div class="container">

  <div class="form-card">

    <div class="header">
      <h2>Comment Management</h2>
      <p>Create, update and manage comments</p>
    </div>

    <form (ngSubmit)="save()" class="comment-form">

      <div class="form-group">
        <label>Post ID</label>
        <input
          type="number"
          [(ngModel)]="form.postId"
          name="postId"
          placeholder="Enter post id"
        />
      </div>

      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="form.name"
          name="name"
          placeholder="Enter name"
        />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          placeholder="Enter email"
        />
      </div>

      <div class="form-group">
        <label>Comment</label>
        <textarea
          rows="5"
          [(ngModel)]="form.body"
          name="body"
          placeholder="Write your comment..."
        ></textarea>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn primary-btn">
          {{ editingId ? 'Update Comment' : 'Create Comment' }}
        </button>

        <button type="button" class="btn secondary-btn" (click)="reset()">
          Reset
        </button>
      </div>

    </form>

  </div>

  <div class="list-card">

    <div class="list-header">
      <h3>Comments List</h3>
      <span>{{ comments.length }} Comments</span>
    </div>

    <div class="comment-card" *ngFor="let c of comments">

      <div class="top-section">

        <div>
          <h4>{{ c.name }}</h4>
          <p>{{ c.email }}</p>
        </div>

        <div class="post-id">
          Post #{{ c.postId }}
        </div>

      </div>

      <div class="body-section">
        {{ c.body }}
      </div>

      <div class="action-buttons">
        <button class="edit-btn" (click)="edit(c)">
          Edit
        </button>

        <button class="delete-btn" (click)="remove(c.id)">
          Delete
        </button>
      </div>

    </div>

  </div>

</div>
