spring.application.name=backend

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# MYSQL DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/indore
spring.datasource.username=root
spring.datasource.password=Admin@123
