<div class="counter-container">
  <h1>This is my first Angular app  </h1>
  <h2>Angular Counter App</h2>

  <div class="count">
    {{ count }}
  </div>

  <div class="buttons">
    <button (click)="decrement()">-</button>
    <button (click)="reset()">Reset</button>
    <button (click)="increment()">+</button>
  </div>
</div>
